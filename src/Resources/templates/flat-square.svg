<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="{{ totalWidth }}" height="20" role="img" aria-label="{{ vendor }}: {{ value }}">
    <title>{{ vendor }}: {{ value }}</title>
    <g shape-rendering="crispEdges">
        <rect width="{{ vendorWidth }}" height="20" fill="{{ vendorColor }}"/>
        <rect x="{{ vendorWidth }}" width="{{ valueWidth }}" height="20" fill="{{ valueColor }}"/>
    </g>
    {{ logoElement }}
    <g fill="#fff" text-anchor="middle" font-family="Verdana,Geneva,DejaVu Sans,sans-serif" text-rendering="geometricPrecision" font-size="110">
        <text x="{{ vendorStartX }}" y="140" transform="scale(.1)">{{ vendor }}</text>
        <text x="{{ valueStartX }}" y="140" transform="scale(.1)">{{ value }}</text>
    </g>
</svg>